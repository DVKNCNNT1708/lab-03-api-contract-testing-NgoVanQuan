name: Newman Contract Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  newman:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Lint OpenAPI contracts
        run: npm run lint:contracts

      - name: Start Prism mock servers
        run: |
          npm run mock:all > prism.log 2>&1 &
          echo "Waiting 5 seconds for servers to start..."
          sleep 5
          echo "Server startup complete, attempting connection..."

      - name: Check server connectivity
        run: |
          echo "=== Checking IoT server ==="
          curl -v http://localhost:4010/health || echo "IoT server not responding"
          echo ""
          echo "=== Checking Vision server ==="
          curl -v http://localhost:4011/health || echo "Vision server not responding"
          echo ""
          echo "=== Process list ==="
          ps aux | grep prism || echo "No prism processes found"
          echo ""
          echo "=== Listening ports ==="
          netstat -tlnp 2>/dev/null | grep -E '401[01]|LISTEN' || true

      - name: Wait for mock servers
        run: npx wait-on http://localhost:4010/health http://localhost:4011/health --timeout 90000 --interval 1000 --verbose

      - name: Run Newman contract tests
        run: npm run test:mock

      - name: Show Prism logs on failure
        if: failure()
        run: |
          echo "=== Prism Server Logs ==="
          cat prism.log || true
          echo ""
          echo "=== Full Process Info ==="
          ps aux || true

      - name: Upload Newman reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: reports/
